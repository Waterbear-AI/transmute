services:
  backend:
    build: .
    ports:
      - "54718:54718"
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/transmute.db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:54718/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db-data:
