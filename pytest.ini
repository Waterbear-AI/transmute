[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    integration: Integration tests spanning multiple components
    unit: Isolated unit tests
    e2e: End-to-end tests

# Coverage for the deterministic sentinel/reassessment core. Run with
#   pytest --cov=agents.transmutation.sentinel_engine \
#          --cov=agents.transmutation.scoring_engine \
#          --cov=agents.transmutation.tools
# to produce a terminal report scoped to these modules. Kept opt-in (not in
# addopts) so the default `pytest -q` stays fast and uncluttered.
[coverage:run]
branch = True

[coverage:report]
show_missing = True
precision = 1
